name: Validate profiles and playback resume

on:
  pull_request:
    branches:
      - main
    paths:
      - "MiruroApp/**"
      - ".github/workflows/validate-profile-resume.yml"

permissions:
  contents: read

jobs:
  android-app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Compile and assemble app
        run: |
          chmod +x gradlew
          ./gradlew :MiruroApp:compileDebugKotlin :MiruroApp:assembleDebug --stacktrace
