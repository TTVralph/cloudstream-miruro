name: Apply player hotfix payload

on:
  push:
    branches:
      - agent/player-focus-subtitle-hotfix
    paths:
      - .github/workflows/apply-player-hotfix.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply exact hotfix files
        shell: bash
        run: |
          set -euo pipefail
          cat .hotfix_payload/part-* | base64 --decode > /tmp/anistream-hotfix.tar.gz
          tar -xzf /tmp/anistream-hotfix.tar.gz
          rm -rf .hotfix_payload
          rm -f .github/workflows/apply-player-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix player focus, subtitles, details actions, and long press [skip ci]"
          git push origin HEAD:agent/player-focus-subtitle-hotfix
