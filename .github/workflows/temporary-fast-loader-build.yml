name: Temporary fast staged loader build

on:
  push:
    branches:
      - agent/fast-staged-loader-synopsis
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fast-staged-loader-synopsis
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Apply staged loader integration
        run: python3 scripts/apply_fast_loader.py
      - name: Compile and assemble debug APK
        id: build
        continue-on-error: true
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew :MiruroApp:compileDebugKotlin :MiruroApp:assembleDebug --stacktrace > build.log 2>&1
      - name: Extract build errors
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          grep -E "(^e: |error:|FAILURE:|What went wrong|Execution failed|Unresolved reference|Type mismatch|Cannot infer|No value passed)" build.log | tail -160 > build-errors.txt || true
          tail -120 build.log >> build-errors.txt
          cat build-errors.txt
      - uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'failure'
        with:
          name: staged-loader-build-errors
          path: build-errors.txt
      - name: Fail after diagnostics
        if: steps.build.outcome == 'failure'
        run: exit 1
      - name: Commit generated integration
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MiruroApp/src/main/kotlin/com/ttvralph/miruroapp
          git commit -m "Integrate staged season loading and synopsis metadata"
          git push origin HEAD:agent/fast-staged-loader-synopsis
