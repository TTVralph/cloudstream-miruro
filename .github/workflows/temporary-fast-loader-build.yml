name: Temporary fast staged loader build

on:
  push:
    branches:
      - agent/fast-staged-loader-synopsis

permissions:
  contents: write

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fast-staged-loader-synopsis
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Apply staged loader integration
        run: python3 scripts/apply_fast_loader.py
      - name: Compile and assemble debug APK
        run: |
          chmod +x gradlew
          ./gradlew :MiruroApp:compileDebugKotlin :MiruroApp:assembleDebug --stacktrace
      - name: Commit generated integration
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MiruroApp/src/main/kotlin/com/ttvralph/miruroapp
          git commit -m "Integrate staged season loading and synopsis metadata"
          git push origin HEAD:agent/fast-staged-loader-synopsis
