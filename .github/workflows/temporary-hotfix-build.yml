name: Temporary hotfix build

on:
  push:
    branches:
      - agent/player-focus-subtitle-hotfix
    paths:
      - .github/workflows/temporary-hotfix-build.yml
      - MiruroApp/**

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile and assemble debug APK
        run: |
          chmod +x gradlew
          ./gradlew :MiruroApp:compileDebugKotlin :MiruroApp:assembleDebug --stacktrace
