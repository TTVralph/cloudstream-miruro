name: Validate post-play focus

on:
  push:
    branches:
      - agent/cinematic-minimal-ui
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android TV app
        run: |
          chmod +x gradlew
          ./gradlew :MiruroApp:assembleDebug --stacktrace
