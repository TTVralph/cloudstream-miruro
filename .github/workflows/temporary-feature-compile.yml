name: Temporary feature compile

on:
  push:
    branches:
      - agent/netflix-features-1-7
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Compile Android app
        run: |
          chmod +x gradlew
          ./gradlew :MiruroApp:compileDebugKotlin --stacktrace
