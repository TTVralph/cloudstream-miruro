name: Runtime reliability validation

permissions:
  contents: read

on:
  push:
    branches:
      - agent/runtime-reliability-fixes
  workflow_dispatch:

jobs:
  android-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Test and build Android TV app
        run: |
          chmod +x gradlew
          ./gradlew :MiruroApp:testDebugUnitTest :MiruroApp:assembleDebug --stacktrace
