name: Temporary PR A compile

on:
  push:
    branches:
      - agent/daily-watching-pr-a
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Assemble debug APK
        id: build
        shell: bash
        run: |
          chmod +x gradlew
          set +e
          ./gradlew :MiruroApp:assembleDebug --stacktrace > gradle-build.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "--- compiler diagnostics ---"
            grep -E "(^e: |^w: |FAILURE:|What went wrong|Execution failed|Compilation error|error:)" gradle-build.log | tail -n 240 || tail -n 240 gradle-build.log
          else
            tail -n 40 gradle-build.log
          fi
          exit 0
      - name: Upload Gradle diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-a-gradle-log
          path: gradle-build.log
          retention-days: 1
      - name: Fail unsuccessful build
        if: steps.build.outputs.status != '0'
        run: exit 1
