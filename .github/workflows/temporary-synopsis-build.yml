name: Temporary synopsis build

on:
  push:
    branches:
      - agent/episode-season-synopsis
    paths:
      - .github/workflows/temporary-synopsis-build.yml
      - MiruroApp/**
  pull_request:
    branches:
      - main
    paths:
      - MiruroApp/**
      - .github/workflows/temporary-synopsis-build.yml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile and assemble debug APK
        run: |
          chmod +x gradlew
          ./gradlew :MiruroApp:compileDebugKotlin :MiruroApp:assembleDebug --stacktrace
