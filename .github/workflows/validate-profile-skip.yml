name: Validate profiles and skip prompts

on:
  push:
    branches:
      - agent/cinematic-minimal-ui
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Assemble TV app
        run: |
          chmod +x gradlew
          ./gradlew :MiruroApp:assembleDebug --stacktrace
